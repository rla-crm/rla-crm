<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="RLA crm - Real Estate Lead Management CRM for managing projects, leads and sales teams.">

  <!-- ── PWA / Theme ─────────────────────────────────────── -->
  <meta name="theme-color" content="#7B5FFF">
  <meta name="mobile-web-app-capable" content="yes">

  <!-- ── iOS PWA (Add to Home Screen) ───────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="RLA crm">

  <!-- iOS App Icon (shown on home screen) -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/Icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/Icon-512.png">

  <!-- iOS Splash Screens (portrait) -->
  <!-- iPhone 15 Pro Max / 14 Pro Max -->
  <link rel="apple-touch-startup-image"
        media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
        href="icons/Icon-512.png">
  <!-- iPhone 14 / 13 / 12 -->
  <link rel="apple-touch-startup-image"
        media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
        href="icons/Icon-512.png">
  <!-- iPhone SE / 8 -->
  <link rel="apple-touch-startup-image"
        media="screen and (device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
        href="icons/Icon-512.png">
  <!-- iPad Pro 12.9" -->
  <link rel="apple-touch-startup-image"
        media="screen and (device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)"
        href="icons/Icon-512.png">

  <!-- ── Favicon ────────────────────────────────────────── -->
  <link rel="icon" type="image/png" sizes="32x32" href="favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icons/Icon-512.png">
  <link rel="shortcut icon" href="favicon.png">

  <!-- ── Web App Manifest ───────────────────────────────── -->
  <link rel="manifest" href="manifest.json">

  <!-- ── Open Graph (link previews) ────────────────────── -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="RLA crm">
  <meta property="og:description" content="Real Estate Lead Management CRM">
  <meta property="og:image" content="icons/Icon-512.png">

  <title>RLA crm</title>

  <!-- ── Firebase JS SDK v11.9.1
       Pre-load all modules and assign to window.* so that firebase_core_web
       finds them instantly (no dynamic import needed, bypasses CSP/TrustedTypes).
  ── -->
  <script type="module">
    import * as firebase_core      from "https://www.gstatic.com/firebasejs/11.9.1/firebase-app.js";
    import * as firebase_firestore from "https://www.gstatic.com/firebasejs/11.9.1/firebase-firestore.js";
    import * as firebase_auth      from "https://www.gstatic.com/firebasejs/11.9.1/firebase-auth.js";
    import * as firebase_storage   from "https://www.gstatic.com/firebasejs/11.9.1/firebase-storage.js";
    // Expose on window so flutter firebase_core_web interop can find them
    window.firebase_core      = firebase_core;
    window.firebase_firestore = firebase_firestore;
    window.firebase_auth      = firebase_auth;
    window.firebase_storage   = firebase_storage;
    console.log('[RLA CRM] Firebase JS SDK loaded:', firebase_core.SDK_VERSION);
  </script>

  <!-- ── PDF.js (required by flutter printing package for web PDF preview) ── -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    if (window.pdfjsLib) {
      pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    }
  </script>

  <!-- ── PWA Install Banner + Offline styles ────────────── -->
  <style>
    /* Prevent flash of white during load */
    html, body {
      margin: 0;
      padding: 0;
      background-color: #F4F2FF;
      height: 100%;
    }

    /* iOS safe-area support (notch/Dynamic Island) */
    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* PWA install prompt banner */
    #pwa-install-banner {
      display: none;
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      background: #7B5FFF;
      color: #fff;
      border-radius: 16px;
      padding: 14px 20px;
      box-shadow: 0 8px 32px rgba(123,95,255,0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      align-items: center;
      gap: 12px;
      max-width: 340px;
      width: calc(100% - 40px);
      animation: slideUp 0.3s ease;
    }
    #pwa-install-banner.show { display: flex; }
    #pwa-install-btn {
      background: #fff;
      color: #7B5FFF;
      border: none;
      border-radius: 10px;
      padding: 8px 16px;
      font-weight: 700;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    #pwa-dismiss-btn {
      background: transparent;
      color: rgba(255,255,255,0.7);
      border: none;
      font-size: 20px;
      cursor: pointer;
      padding: 0 4px;
      line-height: 1;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateX(-50%) translateY(20px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* Offline indicator */
    #offline-banner {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0;
      background: #D04060;
      color: #fff;
      text-align: center;
      padding: 8px;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      z-index: 9998;
    }
    #offline-banner.show { display: block; }
  </style>
</head>
<body>

  <!-- Offline banner -->
  <div id="offline-banner">⚠️ You are offline. Some features may not be available.</div>

  <!-- PWA Install banner (Android Chrome / desktop) -->
  <div id="pwa-install-banner">
    <span>📱 Install <strong>RLA crm</strong> on your device</span>
    <button id="pwa-install-btn">Install</button>
    <button id="pwa-dismiss-btn">✕</button>
  </div>

  <!-- Flutter app -->
  <script src="flutter_bootstrap.js" async></script>

  <script>
    // ── Service Worker registration ──────────────────────────
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => {
            console.log('SW registered:', reg.scope);
            // Force-activate new service worker immediately (clears stale caches)
            if (reg.waiting) {
              reg.waiting.postMessage('SKIP_WAITING');
            }
            reg.addEventListener('updatefound', () => {
              const newWorker = reg.installing;
              if (newWorker) {
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    // New version installed — force skip waiting so Chrome gets latest
                    newWorker.postMessage('SKIP_WAITING');
                  }
                });
              }
            });
          })
          .catch(err => console.log('SW error:', err));
        
        // Listen for SW controller change and reload to get fresh app
        navigator.serviceWorker.addEventListener('controllerchange', () => {
          console.log('[SW] Controller changed — reloading for fresh data');
          // Only reload if we haven't recently reloaded (prevent loops)
          if (!sessionStorage.getItem('sw-reloaded')) {
            sessionStorage.setItem('sw-reloaded', '1');
            window.location.reload();
          }
        });
      });
    }

    // ── PWA Install prompt (Android Chrome / Edge) ───────────
    let deferredPrompt;
    const installBanner = document.getElementById('pwa-install-banner');
    const installBtn    = document.getElementById('pwa-install-btn');
    const dismissBtn    = document.getElementById('pwa-dismiss-btn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      // Show banner after 3s delay
      setTimeout(() => installBanner.classList.add('show'), 3000);
    });

    installBtn.addEventListener('click', async () => {
      installBanner.classList.remove('show');
      if (deferredPrompt) {
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        console.log('PWA install outcome:', outcome);
        deferredPrompt = null;
      }
    });

    dismissBtn.addEventListener('click', () => {
      installBanner.classList.remove('show');
      // Don't show again for 7 days
      localStorage.setItem('pwa-banner-dismissed', Date.now());
    });

    // Don't show if dismissed within 7 days
    window.addEventListener('DOMContentLoaded', () => {
      const dismissed = localStorage.getItem('pwa-banner-dismissed');
      if (dismissed && (Date.now() - dismissed) < 7 * 24 * 60 * 60 * 1000) {
        window.removeEventListener('beforeinstallprompt', () => {});
      }
    });

    // ── Offline detection ────────────────────────────────────
    const offlineBanner = document.getElementById('offline-banner');
    window.addEventListener('online',  () => offlineBanner.classList.remove('show'));
    window.addEventListener('offline', () => offlineBanner.classList.add('show'));
  </script>

</body>
</html>
