name: rla_crm
description: RLA crm - Real Estate Lead Management Tool
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  provider: 6.1.5+1
  hive: 2.2.3
  hive_flutter: 1.1.0
  intl: 0.19.0
  uuid: 4.3.3
  fl_chart: 0.69.0
  flutter_staggered_animations: 1.1.1
  google_fonts: 6.2.1
  url_launcher: 6.3.1
  cupertino_icons: ^1.0.2
  pdf: 3.10.8
  printing: 5.12.0
  http: 1.5.0
  firebase_core: 3.6.0
  cloud_firestore: 5.4.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: 2.0.1
  build_runner: 2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icon/
    - assets/fonts/
